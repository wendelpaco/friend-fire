<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Friend Fire cover">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0e08"/>
      <stop offset="35%" stop-color="#2a1810"/>
      <stop offset="70%" stop-color="#0c1018"/>
      <stop offset="100%" stop-color="#06080c"/>
    </linearGradient>
    <radialGradient id="sun" cx="72%" cy="28%" r="40%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#c2410c" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="smoke" cx="35%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#64748b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a0c10" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1c1917" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="silL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#78716c"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <linearGradient id="silR" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a8a29e"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed tactical dusk -->
  <rect width="1600" height="900" fill="url(#sky)"/>
  <rect width="1600" height="900" fill="url(#sun)"/>
  <rect width="1600" height="900" fill="url(#smoke)"/>

  <!-- Horizon haze -->
  <ellipse cx="800" cy="620" rx="900" ry="80" fill="#f59e0b" opacity="0.08"/>

  <!-- Distant skyline blocks -->
  <g opacity="0.35" fill="#0f141c">
    <rect x="80" y="480" width="70" height="140"/>
    <rect x="160" y="520" width="50" height="100"/>
    <rect x="220" y="460" width="90" height="160"/>
    <rect x="1280" y="500" width="60" height="120"/>
    <rect x="1350" y="470" width="100" height="150"/>
    <rect x="1460" y="530" width="50" height="90"/>
  </g>

  <!-- Ground plane -->
  <rect y="600" width="1600" height="300" fill="url(#ground)"/>
  <path d="M0 620 Q400 580 800 600 T1600 590 L1600 900 L0 900 Z" fill="#0a0c10" opacity="0.85"/>

  <!-- Left silhouette (rifle ready) -->
  <g transform="translate(480,520)" fill="url(#silL)" opacity="0.85">
    <!-- legs -->
    <rect x="-28" y="80" width="22" height="90" rx="4"/>
    <rect x="10" y="80" width="22" height="90" rx="4"/>
    <!-- torso -->
    <rect x="-32" y="10" width="68" height="80" rx="10"/>
    <!-- head -->
    <ellipse cx="2" cy="-8" rx="18" ry="22"/>
    <!-- helmet brim -->
    <rect x="-22" y="-18" width="44" height="8" rx="2"/>
    <!-- arms + rifle -->
    <rect x="30" y="20" width="50" height="14" rx="3" transform="rotate(-12 30 27)"/>
    <rect x="70" y="8" width="90" height="10" rx="2" transform="rotate(-18 70 13)"/>
    <rect x="-50" y="35" width="28" height="12" rx="3"/>
  </g>

  <!-- Right silhouette (covering) -->
  <g transform="translate(1080,500)" fill="url(#silR)" opacity="0.9">
    <rect x="-24" y="90" width="20" height="95" rx="4"/>
    <rect x="8" y="90" width="20" height="95" rx="4"/>
    <rect x="-28" y="15" width="60" height="85" rx="10"/>
    <ellipse cx="0" cy="-5" rx="17" ry="20"/>
    <rect x="-20" y="-14" width="40" height="7" rx="2"/>
    <rect x="-70" y="28" width="55" height="12" rx="3" transform="rotate(8 -70 34)"/>
    <rect x="-110" y="18" width="55" height="9" rx="2" transform="rotate(14 -110 22)"/>
    <rect x="28" y="40" width="24" height="12" rx="3"/>
  </g>

  <!-- Muzzle flash hint -->
  <ellipse cx="1185" cy="518" rx="28" ry="14" fill="#fbbf24" opacity="0.35"/>
  <ellipse cx="1185" cy="518" rx="14" ry="7" fill="#fef3c7" opacity="0.5"/>

  <!-- Smoke plumes -->
  <g fill="#94a3b8" opacity="0.12">
    <ellipse cx="700" cy="560" rx="120" ry="50"/>
    <ellipse cx="780" cy="540" rx="80" ry="40"/>
    <ellipse cx="900" cy="555" rx="100" ry="45"/>
  </g>

  <!-- Vignette -->
  <rect width="1600" height="900" fill="url(#ground)" opacity="0.4"/>
  <rect width="1600" height="900" fill="none" stroke="#000" stroke-width="120" opacity="0.45"/>

  <!-- Film grain suggestion (subtle dots) -->
  <g opacity="0.04" fill="#fff">
    <circle cx="120" cy="80" r="1.2"/>
    <circle cx="340" cy="200" r="1"/>
    <circle cx="560" cy="120" r="1.5"/>
    <circle cx="900" cy="90" r="1"/>
    <circle cx="1200" cy="160" r="1.2"/>
    <circle cx="1400" cy="300" r="1"/>
    <circle cx="200" cy="400" r="1.3"/>
    <circle cx="1500" cy="700" r="1"/>
  </g>
</svg>
